<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f9ff;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="personGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="laptopGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e5e7eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d1d5db;stop-opacity:1" />
    </linearGradient>
    
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
    
    <filter id="deepShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGradient)"/>
  
  <!-- Large circle background element -->
  <circle cx="150" cy="100" r="120" fill="#dbeafe" opacity="0.4"/>
  
  <!-- Browser Window Top Left -->
  <g filter="url(#softShadow)" transform="translate(60, 80)">
    <rect width="140" height="120" rx="8" fill="white" stroke="#e5e7eb" stroke-width="1"/>
    <!-- Browser bar -->
    <rect width="140" height="28" rx="8" fill="#3b82f6"/>
    <circle cx="75" cy="14" r="1.5" fill="white"/>
    <circle cx="82" cy="14" r="1.5" fill="white"/>
    <circle cx="89" cy="14" r="1.5" fill="white"/>
    <!-- Content -->
    <line x1="10" y1="42" x2="50" y2="42" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="52" x2="130" y2="52" stroke="#cbd5e1" stroke-width="1" stroke-linecap="round"/>
    <line x1="10" y1="60" x2="130" y2="60" stroke="#cbd5e1" stroke-width="1" stroke-linecap="round"/>
    <line x1="10" y1="68" x2="100" y2="68" stroke="#cbd5e1" stroke-width="1" stroke-linecap="round"/>
    <!-- User icon -->
    <circle cx="15" cy="85" r="6" fill="#0ea5e9"/>
  </g>
  
  <!-- Main Browser Window Center -->
  <g filter="url(#deepShadow)" transform="translate(140, 90)">
    <rect width="200" height="160" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1"/>
    <!-- Browser bar -->
    <rect width="200" height="32" rx="10" fill="#3b82f6"/>
    <circle cx="105" cy="16" r="2" fill="white"/>
    <circle cx="115" cy="16" r="2" fill="white"/>
    <circle cx="125" cy="16" r="2" fill="white"/>
    <!-- Content -->
    <!-- User profile icon -->
    <circle cx="170" cy="60" r="12" fill="#0ea5e9" opacity="0.2"/>
    <circle cx="170" cy="60" r="9" fill="#0ea5e9"/>
    <!-- Text lines -->
    <line x1="20" y1="58" x2="145" y2="58" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="72" x2="180" y2="72" stroke="#cbd5e1" stroke-width="1" stroke-linecap="round"/>
    <line x1="20" y1="82" x2="180" y2="82" stroke="#cbd5e1" stroke-width="1" stroke-linecap="round"/>
    <line x1="20" y1="92" x2="160" y2="92" stroke="#cbd5e1" stroke-width="1" stroke-linecap="round"/>
    <!-- Checkmark -->
    <circle cx="170" cy="125" r="10" fill="#10b981"/>
    <path d="M 166 125 L 169 128 L 174 123" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Status cards right side -->
  <g filter="url(#softShadow)" transform="translate(480, 100)">
    <rect width="130" height="110" rx="8" fill="white" stroke="#e5e7eb" stroke-width="1"/>
    <!-- Checkmarks and X marks -->
    <line x1="15" y1="20" x2="45" y2="20" stroke="#cbd5e1" stroke-width="1" stroke-linecap="round"/>
    <!-- Row 1 -->
    <circle cx="22" cy="40" r="6" fill="#10b981"/>
    <path d="M 19 40 L 21 42 L 26 37" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="35" y1="38" x2="115" y2="38" stroke="#cbd5e1" stroke-width="1" stroke-linecap="round"/>
    
    <!-- Row 2 -->
    <circle cx="22" cy="58" r="6" fill="#ef4444"/>
    <line x1="18" y1="54" x2="26" y2="62" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="26" y1="54" x2="18" y2="62" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="35" y1="56" x2="115" y2="56" stroke="#cbd5e1" stroke-width="1" stroke-linecap="round"/>
    
    <!-- Row 3 -->
    <circle cx="22" cy="76" r="6" fill="#10b981"/>
    <path d="M 19 76 L 21 78 L 26 73" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="35" y1="74" x2="115" y2="74" stroke="#cbd5e1" stroke-width="1" stroke-linecap="round"/>
    
    <!-- Row 4 -->
    <circle cx="22" cy="94" r="6" fill="#ef4444"/>
    <line x1="18" y1="90" x2="26" y2="98" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="26" y1="90" x2="18" y2="98" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="35" y1="92" x2="115" y2="92" stroke="#cbd5e1" stroke-width="1" stroke-linecap="round"/>
  </g>
  
  <!-- Laptop with person -->
  <g filter="url(#deepShadow)" transform="translate(200, 280)">
    <!-- Laptop screen -->
    <rect width="180" height="110" rx="4" fill="#0ea5e9" stroke="#d1d5db" stroke-width="2"/>
    <!-- Screen content -->
    <rect x="8" y="8" width="164" height="20" fill="white" rx="2" opacity="0.9"/>
    <line x1="12" y1="35" x2="160" y2="35" stroke="white" stroke-width="1.5" opacity="0.7" stroke-linecap="round"/>
    <line x1="12" y1="48" x2="160" y2="48" stroke="white" stroke-width="1.5" opacity="0.7" stroke-linecap="round"/>
    <line x1="12" y1="61" x2="140" y2="61" stroke="white" stroke-width="1.5" opacity="0.7" stroke-linecap="round"/>
    <line x1="12" y1="75" x2="160" y2="75" stroke="white" stroke-width="1.2" opacity="0.6" stroke-linecap="round"/>
    <line x1="12" y1="87" x2="145" y2="87" stroke="white" stroke-width="1.2" opacity="0.6" stroke-linecap="round"/>
    
    <!-- Laptop keyboard -->
    <rect x="0" y="110" width="180" height="35" rx="2" fill="url(#laptopGradient)" stroke="#9ca3af" stroke-width="1"/>
    <!-- Keyboard detail -->
    <rect x="4" y="115" width="172" height="6" fill="#9ca3af" opacity="0.5" rx="1"/>
    <rect x="4" y="128" width="172" height="12" fill="#d1d5db" rx="1" opacity="0.6"/>
  </g>
  
  <!-- Person sitting -->
  <g transform="translate(150, 300)">
    <!-- Head -->
    <circle cx="50" cy="35" r="18" fill="#d4a574"/>
    
    <!-- Hair -->
    <ellipse cx="50" cy="25" rx="20" ry="16" fill="#1f2937"/>
    
    <!-- Body - shirt -->
    <path d="M 35 50 Q 35 80 40 100 L 60 100 Q 65 80 65 50 Q 65 45 50 45 Q 35 45 35 50" fill="url(#personGradient)"/>
    
    <!-- Left arm -->
    <ellipse cx="20" cy="70" rx="12" ry="45" fill="#3b82f6" transform="rotate(-35 20 70)"/>
    
    <!-- Right arm reaching to laptop -->
    <path d="M 65 55 Q 120 50 150 65" stroke="#3b82f6" stroke-width="14" fill="none" stroke-linecap="round"/>
    
    <!-- Legs -->
    <rect x="38" y="100" width="10" height="50" fill="#1f2937" rx="5"/>
    <rect x="52" y="100" width="10" height="50" fill="#1f2937" rx="5"/>
    
    <!-- Shoes -->
    <ellipse cx="43" cy="155" rx="10" ry="8" fill="#0f172a"/>
    <ellipse cx="57" cy="155" rx="10" ry="8" fill="#0f172a"/>
  </g>
  
  <!-- Plant pot -->
  <g transform="translate(600, 320)">
    <!-- Pot -->
    <path d="M 15 40 L 10 70 Q 10 75 15 75 L 35 75 Q 40 75 40 70 L 35 40 Z" fill="#ef4444" stroke="#dc2626" stroke-width="1.5"/>
    <!-- Pot rim -->
    <ellipse cx="25" cy="40" rx="12" ry="4" fill="#f87171"/>
    
    <!-- Soil -->
    <ellipse cx="25" cy="68" rx="14" ry="3" fill="#92400e" opacity="0.6"/>
    
    <!-- Plant leaves - left -->
    <path d="M 18 65 Q 8 45 5 20 Q 4 10 8 12 Q 15 30 22 60" fill="#10b981" stroke="#059669" stroke-width="1"/>
    
    <!-- Plant leaves - right -->
    <path d="M 32 65 Q 42 45 45 20 Q 46 10 42 12 Q 35 30 28 60" fill="#06b6d4" stroke="#0891b2" stroke-width="1"/>
    
    <!-- Plant leaf center -->
    <path d="M 25 65 Q 25 40 25 15" stroke="#047857" stroke-width="1.5" fill="none"/>
  </g>
  
  <!-- Decorative elements - dots and lines -->
  <circle cx="80" cy="450" r="3" fill="#3b82f6" opacity="0.3"/>
  <circle cx="680" cy="480" r="2" fill="#0ea5e9" opacity="0.3"/>
  <line x1="100" y1="500" x2="150" y2="500" stroke="#cbd5e1" stroke-width="1" stroke-linecap="round"/>
  <line x1="600" y1="520" x2="680" y2="520" stroke="#cbd5e1" stroke-width="1" stroke-linecap="round"/>
  
  <!-- Text section below -->
  <text x="400" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="900" fill="#1e293b" text-anchor="middle">
    Elevate Your Career
  </text>
  
  <text x="400" y="585" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">
    Join Zenvora to unlock opportunities, access exclusive academic
  </text>
  
  <text x="400" y="602" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">
    resources, and consult industry experts.
  </text>
</svg>

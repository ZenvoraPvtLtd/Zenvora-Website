<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradientAdmin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="lockGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="serverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
    
    <filter id="softShadowAdmin" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.12"/>
    </filter>
    
    <filter id="deepShadowAdmin" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGradientAdmin)"/>
  
  <!-- Decorative network pattern -->
  <circle cx="100" cy="80" r="2" fill="#cbd5e1" opacity="0.3"/>
  <circle cx="200" cy="120" r="2" fill="#cbd5e1" opacity="0.3"/>
  <circle cx="300" cy="70" r="2" fill="#cbd5e1" opacity="0.3"/>
  <circle cx="680" cy="100" r="2" fill="#cbd5e1" opacity="0.3"/>
  <circle cx="720" cy="180" r="2" fill="#cbd5e1" opacity="0.3"/>
  
  <line x1="100" y1="80" x2="200" y2="120" stroke="#cbd5e1" stroke-width="0.5" opacity="0.2"/>
  <line x1="200" y1="120" x2="300" y2="70" stroke="#cbd5e1" stroke-width="0.5" opacity="0.2"/>
  <line x1="680" y1="100" x2="720" y2="180" stroke="#cbd5e1" stroke-width="0.5" opacity="0.2"/>
  
  <!-- Large geometric circle background -->
  <circle cx="150" cy="150" r="100" fill="#dbeafe" opacity="0.3"/>
  
  <!-- Main Lock with Shield -->
  <g filter="url(#deepShadowAdmin)" transform="translate(120, 140)">
    <!-- Lock body background -->
    <rect x="0" y="60" width="120" height="160" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    
    <!-- Lock shackle outer ring -->
    <circle cx="60" cy="60" r="52" fill="none" stroke="url(#lockGradient)" stroke-width="8"/>
    <circle cx="60" cy="60" r="48" fill="none" stroke="#dbeafe" stroke-width="2" opacity="0.5"/>
    
    <!-- Lock shackle inner detail -->
    <path d="M 20 60 Q 20 20 60 20 Q 100 20 100 60" fill="none" stroke="#3b82f6" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Lock keyhole -->
    <circle cx="60" cy="100" r="12" fill="#1e40af"/>
    <rect x="56" y="112" width="8" height="12" fill="#1e40af" rx="2"/>
    
    <!-- Shield badge on lock -->
    <g transform="translate(90, 140)">
      <path d="M 0 0 L 20 0 L 20 25 Q 10 35 0 25 Z" fill="url(#shieldGradient)"/>
      <path d="M 5 8 L 8 12 L 15 5" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    <!-- Lock details -->
    <circle cx="60" cy="180" r="6" fill="#cbd5e1"/>
    <rect x="35" y="195" width="50" height="8" fill="#dbeafe" rx="4"/>
  </g>
  
  <!-- Server Stack -->
  <g filter="url(#softShadowAdmin)" transform="translate(480, 160)">
    <!-- Outer server frame -->
    <rect x="0" y="0" width="200" height="240" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    
    <!-- Server 1 -->
    <g transform="translate(15, 20)">
      <rect width="170" height="55" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
      <rect x="10" y="10" width="20" height="20" fill="url(#serverGradient)" rx="3"/>
      <circle cx="20" cy="20" r="4" fill="#06b6d4" opacity="0.6"/>
      <line x1="40" y1="15" x2="150" y2="15" stroke="#cbd5e1" stroke-width="1"/>
      <line x1="40" y1="25" x2="150" y2="25" stroke="#cbd5e1" stroke-width="1"/>
      <line x1="40" y1="35" x2="120" y2="35" stroke="#cbd5e1" stroke-width="1"/>
    </g>
    
    <!-- Server 2 -->
    <g transform="translate(15, 85)">
      <rect width="170" height="55" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
      <rect x="10" y="10" width="20" height="20" fill="url(#serverGradient)" rx="3"/>
      <circle cx="20" cy="20" r="4" fill="#06b6d4" opacity="0.6"/>
      <line x1="40" y1="15" x2="150" y2="15" stroke="#cbd5e1" stroke-width="1"/>
      <line x1="40" y1="25" x2="150" y2="25" stroke="#cbd5e1" stroke-width="1"/>
      <line x1="40" y1="35" x2="120" y2="35" stroke="#cbd5e1" stroke-width="1"/>
    </g>
    
    <!-- Server 3 -->
    <g transform="translate(15, 150)">
      <rect width="170" height="55" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
      <rect x="10" y="10" width="20" height="20" fill="url(#serverGradient)" rx="3"/>
      <circle cx="20" cy="20" r="4" fill="#06b6d4" opacity="0.6"/>
      <line x1="40" y1="15" x2="150" y2="15" stroke="#cbd5e1" stroke-width="1"/>
      <line x1="40" y1="25" x2="150" y2="25" stroke="#cbd5e1" stroke-width="1"/>
      <line x1="40" y1="35" x2="120" y2="35" stroke="#cbd5e1" stroke-width="1"/>
    </g>
  </g>
  
  <!-- Control Panel -->
  <g filter="url(#softShadowAdmin)" transform="translate(320, 280)">
    <rect width="160" height="200" rx="10" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    
    <!-- Dashboard title -->
    <text x="80" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#1e293b" text-anchor="middle">
      Control Panel
    </text>
    
    <!-- Status indicators -->
    <g transform="translate(20, 40)">
      <rect width="120" height="35" rx="4" fill="#f0fdf4" border="#dcfce7" stroke-width="1"/>
      <circle cx="15" cy="18" r="5" fill="#22c55e"/>
      <text x="30" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#15803d">
        System Online
      </text>
    </g>
    
    <!-- Security status -->
    <g transform="translate(20, 85)">
      <rect width="120" height="35" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
      <circle cx="15" cy="18" r="5" fill="#3b82f6"/>
      <text x="30" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e40af">
        Secured Access
      </text>
    </g>
    
    <!-- Activity monitor -->
    <g transform="translate(20, 130)">
      <rect width="120" height="35" rx="4" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
      <circle cx="15" cy="18" r="5" fill="#eab308"/>
      <text x="30" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#b45309">
        Real-time Monitoring
      </text>
    </g>
    
    <!-- Power indicator -->
    <g transform="translate(20, 175)">
      <circle cx="15" cy="10" r="8" fill="#3b82f6" opacity="0.1"/>
      <circle cx="15" cy="10" r="5" fill="#3b82f6"/>
    </g>
  </g>
  
  <!-- Decorative key element -->
  <g filter="url(#softShadowAdmin)" transform="translate(620, 380)">
    <!-- Key shaft -->
    <rect x="0" y="25" width="60" height="10" fill="#cbd5e1" rx="5"/>
    
    <!-- Key head circle -->
    <circle cx="75" cy="30" r="20" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
    
    <!-- Key head pattern -->
    <circle cx="75" cy="30" r="12" fill="none" stroke="#dbeafe" stroke-width="2"/>
    <circle cx="75" cy="30" r="6" fill="#dbeafe"/>
  </g>
  
  <!-- Connection lines between elements -->
  <line x1="240" y1="220" x2="320" y2="300" stroke="#cbd5e1" stroke-width="1.5" opacity="0.4"/>
  <line x1="680" y1="260" x2="620" y2="380" stroke="#cbd5e1" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Text section -->
  <text x="400" y="540" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="900" fill="#1e293b" text-anchor="middle">
    Admin Access
  </text>
  
  <text x="400" y="570" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">
    Secure access to manage users, applications, and platform
  </text>
  
  <text x="400" y="588" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">
    operations.
  </text>
  
  <!-- Feature badges -->
  <g transform="translate(250, 600)">
    <circle cx="0" cy="0" r="4" fill="#06b6d4"/>
    <text x="12" y="4" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">
      Full Control Panel
    </text>
  </g>
  
  <g transform="translate(520, 600)">
    <circle cx="0" cy="0" r="4" fill="#3b82f6"/>
    <text x="12" y="4" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">
      Real-time Analytics
    </text>
  </g>
</svg>
